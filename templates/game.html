{{define "content"}}
<link rel="stylesheet" href="/static/css/game.css" />

<div id="difficulty-mode-info" data-difficulty_mode="{{ .DifficultyMode }}"></div>

<div class="buttons-container">
	<a href="/pompeii/game_over"><button class="button1">End Game</button></a>
</div>

<div class="subtitle-wrap">
	<h1 class="subtitle" id="game-score">Score: 0</h1>
</div>

<div class="subtitle-wrap">
	<h1 class="subtitle" id="timer">Time Left:<br />...</h1>
</div>

<div class="subtitle-wrap">
	<h1 class="subtitle" id="vocab-word">...</h1>
</div>

<div class="flexbox-grid">
	<div class="subtitle-wrap">
		<h1 class="subtitle" id="fire"></h1>
	</div>
	<div class="image-wrap">
		<img src="/static/images/MrKampen.png" id="game-img" />
	</div>
</div>

<div class="flexbox-grid">
	<form id="answer-form">
		<input type="text" id="answer-input" autocomplete="off" autofocus />
		<input type="submit" hidden />
	</form>
</div>

<script type="module" src="/static/js/game.js"></script>

{{end}}
