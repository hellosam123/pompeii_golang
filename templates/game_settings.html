{{define "content"}}
<link rel="stylesheet" href="../static/css/game_settings.css" />

<div class="buttons-container">
	<a href="/pompeii/index"><button class="button1">Go Back</button></a>
</div>

<div class="subtitle-wrap">
	<h1 class="subtitle">Game Settings</h1>
</div>

<div class="flexbox-grid">
	<div id="game-settings-container">
		<form action="/pompeii/load_game" method="POST">
			<div>
				<label for="vocab-list-form">Vocab List:</label>
				<select id="vocab-list-form" name="vocab-list">
					<option value="Latin IGCSE">Latin IGCSE</option>
					<option value="Latin GCSE DVL">Latin GCSE DVL</option>
				</select>
			</div>

			<div>
				<label for="difficulty-mode-form">Difficulty:</label>
				<select id="difficulty-mode-form" name="difficulty-mode">
					<option value="easy">Easy</option>
					<option value="medium">Medium</option>
					<option value="hard">Hard</option>
				</select>
			</div>

			<div>
				<label for="classic-mode-form"><tip title="Classic mode is the basic vocabulary tester mode">Classic Mode:</tip></label>

				<input type="checkbox" id="classic-mode-form" name="classic-mode" value="true" />
			</div>

			<div>
				<label for="num-questions-form">Number of Questions:</label>
				<input type="number" id="num-questions-form" name="num-questions" value="10" min="1" required />
			</div>

			<div>
				<button class="button1" type="submit">Submit</button>
			</div>
		</form>
	</div>
</div>

<script>
	const classicModeForm = document.getElementById("classic-mode-form");
	const difficultyModeForm = document.getElementById("difficulty-mode-form");
	const numQuestionsForm = document.getElementById("num-questions-form");

	// runs on page load
	difficultyModeForm.disabled = classicModeForm.checked;
	numQuestionsForm.disabled = !classicModeForm.checked;

	classicModeForm.addEventListener("change", function () {
		difficultyModeForm.disabled = classicModeForm.checked;
		numQuestionsForm.disabled = !classicModeForm.checked;
	});
</script>

{{end}}
